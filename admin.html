<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Tacos Fabián</title>
    <meta name="description" content="Panel administrativo de reseñas de Tacos Fabián" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="Volver al inicio">
          <span class="brand-mark" aria-hidden="true">TF</span>
          <span class="brand-text">
            <strong>Tacos Fabián</strong>
            <small>Panel de administración</small>
          </span>
        </a>
        <nav aria-label="Navegación de administrador">
          <ul class="menu desktop-only">
            <li><a href="/">Inicio</a></li>
            <li><a href="/.auth/logout">Cerrar sesión</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1>Reseñas recibidas</h1>
        <p class="muted">Ruta protegida para usuarios autenticados en Azure Static Web Apps.</p>

        <div id="adminStatus" class="muted" aria-live="polite">Cargando reseñas...</div>
        <div class="table-wrap" role="region" aria-label="Tabla de reseñas" tabindex="0">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Estrellas</th>
                <th>Comentario</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
