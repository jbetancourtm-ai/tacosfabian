<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Tacos Fabian</title>
    <meta name="description" content="Panel administrativo de resenas de Tacos Fabian" />
    <link rel="icon" type="image/svg+xml" href="/logo-tacos-fabian.svg" />
    <link rel="shortcut icon" href="/logo-tacos-fabian.svg" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="Volver al inicio">
          <span class="brand-orbit" aria-hidden="true">
            <span class="brand-orbit-dot"></span>
            <span class="brand-mark brand-mark--image">
              <img class="brand-logo" src="/logo-tacos-fabian.svg" alt="" />
            </span>
          </span>
          <span class="brand-text">
            <strong>Tacos Fabian</strong>
            <small>Panel de administracion</small>
          </span>
        </a>

        <nav aria-label="Navegacion de administrador">
          <ul class="menu admin-menu" style="display:flex;position:static;box-shadow:none;border:none;padding:0;background:transparent;">
            <li><a href="/">Inicio</a></li>
            <li><a href="/.auth/logout">Cerrar sesion</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="section section-soft">
      <div class="container">
        <div class="section-head">
          <h1>Resenas recibidas</h1>
          <p class="muted">Ruta protegida para usuarios autenticados en Azure Static Web Apps.</p>
        </div>

        <div id="adminStatus" class="muted" aria-live="polite">Cargando resenas...</div>
        <div class="table-wrap" role="region" aria-label="Tabla de resenas" tabindex="0">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Estrellas</th>
                <th>Comentario</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
