<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Cuestionario Militar - Cadetes</title>
</head>

<body>
  <div class="container">
    <header>
      <h1>Cuestionario para Cadetes</h1>
      <p class="subtitle">Preguntas de deberes y responsabilidades (Ejército y Fuerza Aérea Mexicanos)</p>
    </header>

    <section id="intro">
      <form id="cadet-form">
        <label>Nombre del cadete
          <input type="text" id="name" required placeholder="Nombre completo">
        </label>

        <label>Año
          <select id="year">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>

        <label>Arma o servicio
          <input type="text" id="branch" placeholder="Ej. Infantería, Fuerza Aérea, Sanidad">
        </label>

        <p class="note">Se mostrarán 20 preguntas una por una. Responde y haz clic en "Siguiente".</p>

        <button type="submit" id="start-btn">Comenzar cuestionario</button>
      </form>
    </section>

    <section id="quiz" class="hidden">
      <div id="progress">Pregunta <span id="current">1</span> / 20</div>
      <div id="card">
        <h2 id="question"></h2>
        <div id="options"></div>
      </div>
      <div class="controls">
        <button id="next-btn" disabled>Siguiente</button>
      </div>
    </section>

    <section id="result" class="hidden">
      <div id="result-card">
        <h2 id="result-emoji"></h2>
        <p id="result-text"></p>
        <p id="score-text"></p>
        <p id="advice"></p>
        <button id="restart">Volver a empezar</button>
      </div>
    </section>
  </div>

  <script src="script.js" defer></script>
</body>

</html>
